<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMP Trace Viewer</title>
    <style>
        :root {
            --bg-color: #0f1219;
            --surface-color: #1a1e27;
            --surface-color-hover: #232833;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #272d3b;
            --avax-red: #e84142;
            --avax-red-hover: #f95556;
            --success: #10b981;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: var(--surface-color);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.25rem;
            margin: 0;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        h1::before {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            background-color: var(--avax-red);
            border-radius: 50%;
        }

        .file-upload {
            position: relative;
            display: inline-block;
        }

        .file-upload input[type="file"] {
            display: none;
        }

        .upload-btn {
            background-color: var(--avax-red);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.875rem;
            transition: background-color 0.2s;
            border: none;
        }

        .upload-btn:hover {
            background-color: var(--avax-red-hover);
        }

        main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #timeline-container {
            flex: 2;
            padding: 2rem;
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            position: relative;
        }

        #details-pane {
            flex: 1;
            background-color: var(--surface-color);
            padding: 2rem;
            overflow-y: auto;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            text-align: center;
        }

        .span-row {
            margin-bottom: 0.5rem;
            position: relative;
            height: 2.5rem;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.1s;
        }

        .span-row:hover {
            background-color: var(--surface-color-hover);
        }

        .span-row.selected {
            background-color: var(--surface-color-hover);
            outline: 1px solid var(--avax-red);
        }

        .span-bar {
            position: absolute;
            height: 1.5rem;
            top: 0.5rem;
            background: linear-gradient(90deg, rgba(232, 65, 66, 0.8) 0%, rgba(232, 65, 66, 0.5) 100%);
            border-radius: 3px;
            border: 1px solid var(--avax-red);
            display: flex;
            align-items: center;
            padding: 0 0.5rem;
            box-sizing: border-box;
            min-width: 4px;
            overflow: hidden;
        }

        .span-label {
            font-size: 0.75rem;
            white-space: nowrap;
            color: white;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
            pointer-events: none;
        }

        .details-title {
            font-size: 1.125rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .detail-item {
            margin-bottom: 1rem;
        }

        .detail-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .detail-value {
            font-size: 0.875rem;
            font-family: monospace;
            background-color: var(--bg-color);
            padding: 0.5rem;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            word-break: break-all;
        }

        .attributes-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 0.5rem;
        }

        .attributes-table th,
        .attributes-table td {
            padding: 0.5rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.875rem;
        }

        .attributes-table th {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .attributes-table td:first-child {
            font-family: monospace;
            color: #38bdf8;
        }

        #timeline-grid {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 2rem;
            right: 2rem;
            pointer-events: none;
            z-index: 0;
        }

        .grid-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1px;
            background-color: var(--border-color);
        }

        .grid-label {
            position: absolute;
            top: 0.5rem;
            transform: translateX(-50%);
            font-size: 0.65rem;
            color: var(--text-secondary);
        }

        #spans-container {
            position: relative;
            z-index: 1;
            margin-top: 2rem;
            /* space for grid labels */
            min-height: 100%;
        }
    </style>
</head>

<body>
    <header>
        <h1>AMP Trace Viewer</h1>
        <div class="file-upload">
            <label for="trace-upload" class="upload-btn">Load Trace File</label>
            <input type="file" id="trace-upload" accept=".log,.txt,.json">
        </div>
    </header>

    <main>
        <div id="timeline-container">
            <div id="timeline-grid"></div>
            <div id="spans-container">
                <div class="empty-state">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem; opacity: 0.5;">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                    </svg>
                    <h2>No Trace Loaded</h2>
                    <p>Click "Load Trace File" to visualize telemetry data.</p>
                </div>
            </div>
        </div>

        <div id="details-pane">
            <div class="empty-state" id="details-empty">
                <p>Select a span to view details</p>
            </div>
            <div id="details-content" style="display: none;">
                <h2 class="details-title" id="d-name">Span Name</h2>

                <div class="detail-item">
                    <div class="detail-label">Service</div>
                    <div class="detail-value" id="d-service">-</div>
                </div>

                <div class="detail-item">
                    <div class="detail-label">Trace ID</div>
                    <div class="detail-value" id="d-trace-id">-</div>
                </div>

                <div class="detail-item">
                    <div class="detail-label">Start Time</div>
                    <div class="detail-value" id="d-start">-</div>
                </div>

                <div class="detail-item">
                    <div class="detail-label">Duration</div>
                    <div class="detail-value" id="d-duration">-</div>
                </div>

                <div class="detail-item">
                    <div class="detail-label">Attributes</div>
                    <table class="attributes-table" id="d-attributes">
                        <tbody>
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('trace-upload').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const text = e.target.result;
                    let data;
                    if (text.trim().startsWith('[') || text.trim().startsWith('{')) {
                        data = JSON.parse(text);
                    } else {
                        data = parsePlainTextLog(text);
                    }
                    renderTrace(data);
                } catch (err) {
                    alert("Error parsing file. Ensure it is a valid AMP trace export log or JSON.");
                    console.error(err);
                }
            };
            reader.readAsText(file);
        });

        function parsePlainTextLog(text) {
            const lines = text.split('\n');
            const spans = [];
            let currentSpan = null;

            for (const line of lines) {
                if (line.includes('--- AMP Telemetry Event ---')) {
                    if (currentSpan && Object.keys(currentSpan).length > 0) {
                        spans.push(currentSpan);
                    }
                    currentSpan = {};
                } else if (currentSpan && line.startsWith('Match ID:')) {
                    currentSpan.match_id = line.replace('Match ID:', '').trim();
                } else if (currentSpan && line.startsWith('Type:')) {
                    currentSpan.event_type = line.replace('Type:', '').trim();
                } else if (currentSpan && line.startsWith('Time:')) {
                    currentSpan.timestamp = parseInt(line.replace('Time:', '').trim(), 10);
                }
            }
            if (currentSpan && Object.keys(currentSpan).length > 0) {
                spans.push(currentSpan);
            }
            return spans;
        }

        function renderTrace(data) {
            const spansContainer = document.getElementById('spans-container');
            const gridContainer = document.getElementById('timeline-grid');
            const spans = Array.isArray(data) ? data : (data.spans || []);

            if (spans.length === 0) {
                spansContainer.innerHTML = '<div class="empty-state"><p>Trace contains no spans.</p></div>';
                return;
            }

            // Normalize telemetry: if start_time/end_time are missing but we have timestamp, synthesize it
            let normalizedSpans = spans.map(s => {
                const start = s.start_time || s.timestamp || 0;
                const end = s.end_time || (start + (s.duration || 100)); // arbitrary 100ms if no duration
                return {
                    ...s,
                    normalized_start: start,
                    normalized_end: end,
                    name: s.name || s.event_type || 'Unknown Event'
                };
            });

            normalizedSpans.sort((a, b) => a.normalized_start - b.normalized_start);

            const globalStart = normalizedSpans[0].normalized_start;
            const globalEnd = Math.max(...normalizedSpans.map(s => s.normalized_end));
            const totalDuration = Math.max(1, globalEnd - globalStart);

            spansContainer.innerHTML = '';
            gridContainer.innerHTML = '';

            // Render Grid (5 lines)
            for (let i = 0; i <= 5; i++) {
                const percent = (i / 5) * 100;
                const line = document.createElement('div');
                line.className = 'grid-line';
                line.style.left = `${percent}%`;

                const label = document.createElement('div');
                label.className = 'grid-label';
                label.textContent = `+${Math.round((totalDuration * (i / 5)) / 1000)}ms`;
                line.appendChild(label);

                gridContainer.appendChild(line);
            }

            // Render Spans
            normalizedSpans.forEach((span, index) => {
                const startOffset = span.normalized_start - globalStart;
                const duration = span.normalized_end - span.normalized_start;

                const leftPercent = (startOffset / totalDuration) * 100;
                const widthPercent = Math.max(1, (duration / totalDuration) * 100); // min 1% width to be visible

                const row = document.createElement('div');
                row.className = 'span-row';

                const bar = document.createElement('div');
                bar.className = 'span-bar';
                bar.style.left = `${leftPercent}%`;
                bar.style.width = `${widthPercent}%`;

                const label = document.createElement('span');
                label.className = 'span-label';
                label.textContent = span.name;

                bar.appendChild(label);
                row.appendChild(bar);

                row.addEventListener('click', () => {
                    document.querySelectorAll('.span-row').forEach(r => r.classList.remove('selected'));
                    row.classList.add('selected');
                    showDetails(span);
                });

                spansContainer.appendChild(row);
            });
        }

        function showDetails(span) {
            document.getElementById('details-empty').style.display = 'none';
            document.getElementById('details-content').style.display = 'block';

            document.getElementById('d-name').textContent = span.name;
            document.getElementById('d-service').textContent = span.service || 'amp-node';
            document.getElementById('d-trace-id').textContent = span.trace_id || span.match_id || 'N/A';
            document.getElementById('d-start').textContent = typeof span.normalized_start === 'number' ? new Date(span.normalized_start / 1000).toISOString() : span.normalized_start;

            const durationMs = (span.normalized_end - span.normalized_start) / 1000;
            document.getElementById('d-duration').textContent = `${durationMs.toFixed(2)} ms`;

            const attrsTbody = document.querySelector('#d-attributes tbody');
            attrsTbody.innerHTML = '';

            const attrs = span.attributes || span.tags || {};
            if (Object.keys(attrs).length === 0) {
                attrsTbody.innerHTML = '<tr><td colspan="2" style="color:var(--text-secondary);text-align:center;">No attributes</td></tr>';
            } else {
                for (const [key, value] of Object.entries(attrs)) {
                    const tr = document.createElement('tr');
                    const tdKey = document.createElement('td');
                    tdKey.textContent = key;
                    const tdVal = document.createElement('td');
                    tdVal.textContent = typeof value === 'object' ? JSON.stringify(value) : value;
                    tr.appendChild(tdKey);
                    tr.appendChild(tdVal);
                    attrsTbody.appendChild(tr);
                }
            }
        }
    </script>
</body>

</html>
