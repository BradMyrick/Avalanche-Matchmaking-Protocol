version: '3.8'

services:
  avalanche:
    image: avaplatform/avalanchego:latest
    container_name: avalanche_localnet
    ports:
      - "9650:9650"
      - "9651:9651"
    volumes:
      - ./config:/root/.avalanchego
    command: |
      /avalanchego/avalanchego
      --http-host=0.0.0.0
      --api-admin-enabled=true
      --staking-enabled=false
      --network-id=local
      --chain-config-dir=/root/.avalanchego/chains
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9650/ext/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  amp-server:
    build:
      context: ../../
      dockerfile: docker/amp-server.Dockerfile
    container_name: amp_server_localnet
    depends_on:
      avalanche:
        condition: service_healthy
    ports:
      - "50051:50051"
    volumes:
      - amp-server-data:/app/data
    environment:
      - AMP_ADDR=0.0.0.0:50051
      - VERIFIER_KEY=${AMP_VERIFIER_PRIVATE_KEY}
      - RELAYER_RPC_ADDR=${RELAYER_RPC_ADDR:-amp-relayer:50052}
      - TELEMETRY_ADDR=${TELEMETRY_ADDR:-amp-telemetry:4317}

volumes:
  avalanche_data:
    driver: local
  amp-server-data:
