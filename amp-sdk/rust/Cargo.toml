[package]
name = "amp-sdk"
version = "0.1.0"
edition = "2021"
description = "Avalanche Matchmaking Protocol SDK for Rust"
license = "Apache-2.0"
repository = "https://github.com/avalanche-matchmaking-protocol/amp"
homepage = "https://github.com/avalanche-matchmaking-protocol/amp"
documentation = "https://docs.amp.avalanche.dev"

[features]
default = ["serde"]
wasm = ["capnp-wasm", "js-sys", "web-sys"]

[dependencies]
capnp = "0.19"
capnpc = "0.19"
serde = { version = "1.0", features = ["derive"], optional = true }
serde_json = { version = "1.0", optional = true }
thiserror = "1.0"
async-trait = "0.1"
tracing = "0.1"
bytes = "1.5"
hex = "0.4"

# Avalanche dependencies
avalanche-types = { git = "https://github.com/ava-labs/avalanche-types-rs", optional = true }

# For WASM support
capnp-wasm = { version = "0.19", optional = true }
js-sys = { version = "0.3", optional = true }
web-sys = { version = "0.3", optional = true }

[dev-dependencies]
tokio = { version = "1.35", features = ["full"] }
tracing-subscriber = "0.3"

[build-dependencies]
capnpc = "0.19"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]