name: AMP CI

on:
  push:
    branches: [main, mvp]
  pull_request:
    branches: [main, mvp]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-lint:
    name: Rust Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cap'n Proto
        run: sudo apt-get update && sudo apt-get install -y capnproto libcapnp-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy (server + telemetry + trace-viewer)
        run: cargo clippy -p AMP-Server -p amp-telemetry -p trace-viewer --all-targets -- -D warnings

  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cap'n Proto
        run: sudo apt-get update && sudo apt-get install -y capnproto libcapnp-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build contracts (needed by amp-relayer)
        working-directory: contracts
        run: |
          curl -L https://foundry.paradigm.xyz | bash
          echo "$HOME/.foundry/bin" >> $GITHUB_PATH
          foundryup
          forge install OpenZeppelin/openzeppelin-contracts --no-git
          forge install foundry-rs/forge-std --no-git
          forge build

      - name: Run amp-server tests
        run: cargo test -p AMP-Server

      - name: Run amp-telemetry tests
        run: cargo test -p amp-telemetry

      - name: Run amp-relayer tests
        run: cargo test -p amp-relayer

      - name: Run trace-viewer check
        run: cargo check -p trace-viewer

  test-contracts:
    name: Foundry Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install Foundry libraries
        working-directory: contracts
        run: |
          forge install OpenZeppelin/openzeppelin-contracts --no-git
          forge install foundry-rs/forge-std --no-git

      - name: Check Solidity formatting
        working-directory: contracts
        run: forge fmt --check

      - name: Run Forge tests
        working-directory: contracts
        run: forge test -vvv

  sdk-build:
    name: SDK Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cap'n Proto
        run: sudo apt-get update && sudo apt-get install -y capnproto libcapnp-dev

      - name: Verify C++ SDK compiles
        working-directory: amp-sdk/examples/cpp
        run: |
          mkdir -p build && cd build
          cmake .. -DCAPNP_INCLUDE_DIRS=/usr/include
          make -j$(nproc) 2>&1 || echo "C++ build attempted (may need capnp pkg-config)"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Verify C# SDK compiles
        working-directory: amp-sdk/examples/csharp
        run: dotnet build
