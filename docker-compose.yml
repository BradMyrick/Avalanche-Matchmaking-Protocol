version: "3.9"

services:
  amp-telemetry:
    build:
      context: .
      dockerfile: docker/amp-telemetry.Dockerfile
    environment:
      - TELEMETRY_ADDR=${TELEMETRY_ADDR}
    ports:
      - "4317:4317"

  amp-relayer:
    build:
      context: .
      dockerfile: docker/amp-relayer.Dockerfile
    environment:
      - FUJI_RPC_URL=${FUJI_RPC_URL}
      - RELAYER_PRIVATE_KEY=${RELAYER_PRIVATE_KEY}
      - CONTRACT_REGISTRY=${CONTRACT_REGISTRY}
      - CONTRACT_SETTLEMENT=${CONTRACT_SETTLEMENT}
      - RPC_PORT=${RPC_PORT:-50052}
    ports:
      - "${RPC_PORT:-50052}:${RPC_PORT:-50052}"
    depends_on:
      - amp-telemetry

  amp-server:
    build:
      context: .
      dockerfile: docker/amp-server.Dockerfile
    volumes:
      - amp-server-data:/app/data
    environment:
      - AMP_ADDR=0.0.0.0:50051
      - VERIFIER_KEY=${VERIFIER_KEY}
      - RELAYER_RPC_ADDR=${RELAYER_RPC_ADDR:-amp-relayer:50052}
      - TELEMETRY_ADDR=${TELEMETRY_ADDR:-amp-telemetry:4317}
    ports:
      - "50051:50051"
    depends_on:
      - amp-telemetry
      - amp-relayer

volumes:
  amp-server-data:
