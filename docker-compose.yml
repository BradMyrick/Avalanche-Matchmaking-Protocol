services:
  amp-telemetry:
    build:
      context: .
      dockerfile: docker/amp-telemetry.Dockerfile
    restart: unless-stopped
    volumes:
      - amp-telemetry-data:/app/data
    ports:
      - "4317:4317"

  amp-relayer:
    build:
      context: .
      dockerfile: docker/amp-relayer.Dockerfile
    restart: unless-stopped
    volumes:
      - amp-relayer-data:/app/relayer-data
    environment:
      - FUJI_RPC_URL=${FUJI_RPC_URL}
      - RELAYER_PRIVATE_KEY_FILE=/run/secrets/relayer_key
      - CONTRACT_REGISTRY=${CONTRACT_REGISTRY}
      - CONTRACT_SETTLEMENT=${CONTRACT_SETTLEMENT}
      - RPC_PORT=${RPC_PORT:-50052}
      - RELAYER_DB_PATH=/app/relayer-data
      - RELAYER_TLS_CERT_FILE=${RELAYER_TLS_CERT_FILE}
      - RELAYER_TLS_KEY_FILE=${RELAYER_TLS_KEY_FILE}
      - RELAYER_API_KEY_FILE=/run/secrets/relayer_api_key
    secrets:
      - relayer_key
      - relayer_api_key
    ports:
      - "${RPC_PORT:-50052}:${RPC_PORT:-50052}"
    depends_on:
      amp-telemetry:
        condition: service_healthy

  amp-server:
    build:
      context: .
      dockerfile: docker/amp-server.Dockerfile
    restart: unless-stopped
    volumes:
      - amp-server-data:/app/data
    environment:
      - AMP_ADDR=0.0.0.0:50051
      - AMP_DB_PATH=/app/data
      - AMP_CHAIN_ID=${AMP_CHAIN_ID:-43113}
      - AMP_SETTLEMENT_ADDRESS=${AMP_SETTLEMENT_ADDRESS}
      - VERIFIER_KEY_FILE=/run/secrets/verifier_key
      - RELAYER_RPC_ADDR=${RELAYER_RPC_ADDR:-amp-relayer:50052}
      - RELAYER_API_KEY_FILE=/run/secrets/relayer_api_key
      - TELEMETRY_ADDR=${TELEMETRY_ADDR:-amp-telemetry:4317}
      - AMP_TLS_CERT_FILE=${AMP_TLS_CERT_FILE}
      - AMP_TLS_KEY_FILE=${AMP_TLS_KEY_FILE}
    secrets:
      - verifier_key
      - relayer_api_key
    ports:
      - "50051:50051"
    depends_on:
      amp-telemetry:
        condition: service_healthy
      amp-relayer:
        condition: service_healthy

volumes:
  amp-server-data:
  amp-relayer-data:
  amp-telemetry-data:

secrets:
  relayer_key:
    file: ${RELAYER_KEY_FILE:-secrets/relayer_key.txt}
  verifier_key:
    file: ${VERIFIER_KEY_FILE:-secrets/verifier_key.txt}
  relayer_api_key:
    file: ${RELAYER_API_KEY_FILE:-secrets/relayer_api_key.txt}
