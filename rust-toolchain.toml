# Phase 2.3 — pinned Rust toolchain for reproducible builds.
# Edition 2024 requires Rust 1.85+; alloy 2.x requires 1.91+. Pinning to
# 1.91.x keeps the project on a known-tested baseline that satisfies all
# current deps. CI consumes this file automatically.
#
# To bump: update both `channel` and any `dtolnay/rust-toolchain@stable`
# references in `.github/workflows/*.yml` in the same commit, then run the
# full test suite locally.
[toolchain]
channel = "1.91.0"
components = ["rustfmt", "clippy", "rust-src"]
profile = "minimal"
